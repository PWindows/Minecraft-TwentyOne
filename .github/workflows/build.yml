name: Build Minecraft-TwentyOne Font

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download BitsNPicas
        run: |
          curl -L -o BitsNPicas.jar https://github.com/kreativekorp/bitsnpicas/releases/download/v2.0/BitsNPicas.jar
      
      - name: Build TTF from PNGs
        run: |
          mkdir -p output
          java -jar BitsNPicas.jar -convert -format ttf -fontfile ./glyphs/ -out ./output/Minecraft-TwentyOne.ttf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-TwentyOne-font
          path: ./output/
