name: Build Minecraft-TwentyOne Font

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bits-n-picas
        run: |
          pip install bits-n-picas

      - name: Build TTF from PNGs
        run: |
          mkdir -p output
          bnp-glyph-pack -f ./glyphs/ -o ./output/Minecraft-TwentyOne.ttf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-TwentyOne-font
          path: ./output/