name: Build Minecraft-TwentyOne Font

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download BitsNPicas
        run: |
          curl -L -o BitsNPicas.jar https://github.com/kreativekorp/bitsnpicas/releases/download/v2.0/BitsNPicas.jar

      - name: Build TTF from PNGs
        run: |
          mkdir -p output
          java -jar BitsNPicas.jar convertbitmap \
            -format ttf \
            -em 2100 \
            -family "Minecraft TwentyOne" \
            -out ./output/Minecraft-TwentyOne.ttf \
            ./glyphs/*.png

      - name: Install fonttools for WOFF/WOFF2
        run: |
          pip install fonttools brotli

      - name: Convert TTF to WOFF/WOFF2
        run: |
          cd output
          pyftsubset Minecraft-TwentyOne.ttf --flavor=woff --output-file=Minecraft-TwentyOne.woff
          pyftsubset Minecraft-TwentyOne.ttf --flavor=woff2 --output-file=Minecraft-TwentyOne.woff2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-TwentyOne-font
          path: ./output/
